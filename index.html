<!DOCTYPE html>  
<html lang="ar" dir="rtl">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">  
    <title>طوارئ الحمادي - ER Reception</title>  
      
    <!-- إعدادات التطبيق للهواتف -->  
    <meta name="apple-mobile-web-app-capable" content="yes">  
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">  
    <meta name="apple-mobile-web-app-title" content="طوارئ الحمادي">  
    <meta name="theme-color" content="#020f14">  
      
    <!-- رابط الـ Manifest المدمج لجعل المتصفح يتعرف عليه كتطبيق -->  
    <link rel="manifest" href="data:application/json;base64,ewogICJsaXN0IjogW10sCiAgIm5hbWUiOiAi2LfYp9ix2Kkg2KfZhNit2YXYp9iv2YoiLAogICJzaG9ydF9uYW1lIjogInRhcmF3aSIsCiAgInN0YXJ0X3VybCI6ICIuIiwKICAiZGlzcGxheSI6ICJzdGFuZGFsb25lIiwKICAiYmFja2dyb3VuZF9jb2xvciI6ICIjMDIwZjE0IiwKICAidGhlbWVfY29sb3IiOiAiIzAyMGYxNCIsCiAgImRpciI6ICJydGwiLAogICJsYW5nIjogImFyIgp9">  
  
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">  
      
    <style>  
        :root {  
            --bg: #020f14;  
            --surface: #071c24;  
            --surface-hi: #0b2a35;  
            --surface-glow: #0f3545;  
            --teal: #00d4b8;  
            --teal-dim: rgba(0,212,184,0.12);  
            --amber: #f5a623;  
            --amber-bright: #fbbf24;  
            --amber-dim: rgba(245,166,35,0.12);  
            --red: #ef4444;  
            --red-dim: rgba(239,68,68,0.12);  
            --text: #e8f4f2;  
            --text-dim: #5a8080;  
            --border: rgba(0,212,184,0.1);  
            --border-hi: rgba(0,212,184,0.2);  
        }  
  
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }  
        input, button, select { user-select: auto; }  
          
        body {  
            background-color: var(--bg);  
            background-image:  
                radial-gradient(ellipse at top left, rgba(26,86,176,0.08) 0%, transparent 55%),  
                radial-gradient(ellipse at bottom right, rgba(0,212,184,0.05) 0%, transparent 55%);  
            font-family: 'Tajawal', sans-serif;  
            color: var(--text);  
            position: fixed;  
            inset: 0;  
            overflow: hidden;  
            padding-top: env(safe-area-inset-top);  
            padding-bottom: env(safe-area-inset-bottom);  
        }  
  
        #app {  
            position: absolute;  
            inset: 0;  
            max-width: 430px;  
            margin: 0 auto;  
            display: flex;  
            flex-direction: column;  
            height: 100%;  
        }  
  
        /* Header */  
        .header { padding:15px 20px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }  
        .header-brand { display:flex; align-items:center; gap:12px; }  
        .brand-text h1 { font-size:1.1rem; font-weight:900; }  
        .brand-text p { font-size:0.7rem; color:var(--text-dim); }  
  
        /* Tab bar */  
        .tab-bar { display:flex; margin:0 16px 12px; background:var(--surface); border-radius:14px; padding:4px; gap:4px; flex-shrink:0; }  
        .tab-btn { flex:1; padding:11px; border:none; border-radius:10px; font-family:'Tajawal'; font-size:0.85rem; font-weight:700; cursor:pointer; transition:all .2s; background:transparent; color:var(--text-dim); }  
        .tab-btn.active { background:var(--surface-hi); color:var(--teal); }  
  
        /* Pages */  
        .page { display:none; flex-direction:column; flex:1; overflow:hidden; }  
        .page.active { display:flex; }  
  
        /* Balance card */  
        .balance-card { margin:0 16px 12px; background:linear-gradient(135deg, var(--surface-hi) 0%, var(--surface-glow) 100%); border-radius:20px; border:1px solid var(--border-hi); padding:20px; box-shadow:0 10px 30px rgba(0,0,0,0.3); flex-shrink:0; }  
        .balance-amount { font-size:2.4rem; font-weight:900; }  
  
        /* Stats grid */  
        .stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; padding:0 16px 12px; flex-shrink:0; }  
        .stat-box { background:var(--surface); border:1px solid var(--border); border-radius:18px; padding:15px; text-align:center; transition:all .2s; }  
        .stat-box.active-inv, .stat-box.active-cash { border-color:var(--teal); background:var(--teal-dim); box-shadow: 0 0 15px rgba(0,212,184,0.1); }  
  
        /* Input */  
        .input-zone { padding:0 16px 12px; display:flex; gap:10px; flex-shrink:0; }  
        input[type="number"] { flex:1; background:var(--surface-hi); border:2px solid var(--border); border-radius:15px; padding:12px; font-size:1.4rem; color:#fff; text-align:center; outline:none; }  
        input[type="number"]:focus { border-color:var(--teal); }  
        .add-btn { width:65px; border-radius:15px; border:none; font-size:1.8rem; font-weight:bold; cursor:pointer; background:var(--teal); color:var(--bg); }  
  
        /* History */  
        .history-section { flex:1; background:rgba(0,0,0,0.25); border-radius:25px 25px 0 0; display:flex; flex-direction:column; overflow:hidden; }  
        .history-header { padding:12px 16px; display:flex; justify-content:space-between; align-items:center; border-bottom: 1px solid var(--border); }  
        .history-list { flex:1; overflow-y:auto; padding:15px; -webkit-overflow-scrolling:touch; }  
  
        .tx-item { background:var(--surface); padding:14px; border-radius:14px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; animation: slideIn 0.3s ease; }  
          
        /* Modals */  
        .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:2000; align-items:center; justify-content:center; backdrop-filter: blur(4px); }  
        .modal-overlay.open { display:flex; }  
        .modal-box { background:var(--surface-hi); border:1px solid var(--border-hi); border-radius:22px; padding:25px; width:90%; max-width:340px; text-align:center; }  
        .modal-input, .modal-select { width:100%; background:var(--surface); border:2px solid var(--border); border-radius:12px; padding:12px; color:#fff; margin-bottom:10px; font-family: inherit; }  
          
        /* Buttons */  
        .close-day-btn { margin:0 16px 12px; padding:14px; border-radius:15px; border:1px solid var(--teal); background:var(--teal-dim); color:var(--teal); font-weight:700; cursor:pointer; }  
        .btn-teal { background:var(--teal); color:var(--bg); border:none; padding:12px; border-radius:12px; font-weight:700; flex:1; }  
        .btn-cancel { background:var(--surface); color:var(--text); border:1px solid var(--border); padding:12px; border-radius:12px; flex:1; }  
        .btn-danger { background:var(--red); color:#fff; border:none; padding:12px; border-radius:12px; font-weight:700; flex:1; }  
  
        .status-badge { padding:4px 10px; border-radius:10px; font-size:0.7rem; font-weight:bold; }  
        .status-accepted { background:rgba(0,212,184,0.1); color:var(--teal); }  
        .status-pending { background:rgba(245,166,35,0.1); color:var(--amber-bright); }  
        .status-rejected { background:rgba(239,68,68,0.1); color:var(--red); }  
  
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }  
    </style>  
</head>  
<body>  
  
<div id="app">  
    <!-- Header -->  
    <div class="header">  
        <div class="header-brand">  
            <svg width="40" height="40" viewBox="0 0 44 44">  
                <rect width="44" height="44" rx="10" fill="#0d1f2d"/>  
                <path d="M12 22H32M22 12V32" stroke="#00d4b8" stroke-width="4" stroke-linecap="round"/>  
            </svg>  
            <div class="brand-text">  
                <h1>طوارئ الحمادي</h1>  
                <p>قسم الاستقبال</p>  
            </div>  
        </div>  
        <div style="text-align:left">  
            <div id="time-chip" style="font-weight:900; font-size:1.2rem;">00:00</div>  
            <div id="date-chip" style="font-size:0.7rem; color:var(--teal);">--/--/----</div>  
        </div>  
    </div>  
  
    <!-- Navigation -->  
    <div class="tab-bar">  
        <button class="tab-btn active" onclick="showTab('main')">🏠 التحصيل</button>  
        <button class="tab-btn" onclick="showTab('patients')">🏥 المرضى</button>  
        <button class="tab-btn" onclick="showTab('archive')">📅 السجل</button>  
    </div>  
  
    <!-- Main Page -->  
    <div id="page-main" class="page active">  
        <div class="balance-card">  
            <div style="font-size:0.8rem; color:var(--text-dim);">إجمالي وردية اليوم</div>  
            <div style="display:flex; align-items:baseline; gap:8px;">  
                <span class="balance-amount" id="main-balance">0.00</span>  
                <span style="color:var(--teal); font-weight:bold;">ريال</span>  
            </div>  
            <div style="display:flex; gap:20px; margin-top:15px; border-top:1px solid var(--border); padding-top:10px;">  
                <div>  
                    <div style="font-size:0.65rem; color:var(--text-dim);">شبكة (SPAN)</div>  
                    <div id="inv-sum-bal" style="color:var(--teal); font-weight:800;">0.00</div>  
                </div>  
                <div>  
                    <div style="font-size:0.65rem; color:var(--text-dim);">كاش (Cash)</div>  
                    <div id="cash-sum-bal" style="color:var(--teal); font-weight:800;">0.00</div>  
                </div>  
            </div>  
        </div>  
  
        <div class="stats-grid">  
            <div id="card-inv" class="stat-box active-inv" onclick="setMode('invoice')">  
                <div style="font-size:1.3rem;">🧾</div>  
                <div style="font-size:0.75rem; margin-top:4px;">فاتورة شبكة</div>  
                <div id="count-inv" style="font-weight:900; font-size:1.1rem; color:var(--teal);">0</div>  
            </div>  
            <div id="card-cash" class="stat-box" onclick="setMode('cash')">  
                <div style="font-size:1.3rem;">💵</div>  
                <div style="font-size:0.75rem; margin-top:4px;">دفع كاش</div>  
                <div id="count-cash" style="font-weight:900; font-size:1.1rem; color:var(--teal);">0</div>  
            </div>  
        </div>  
  
        <div class="input-zone">  
            <input type="number" id="amt-input" placeholder="0.00" inputmode="decimal">  
            <button class="add-btn" onclick="addEntry()">+</button>  
        </div>  
  
        <button class="close-day-btn" onclick="confirmCloseDay()">📦 إغلاق الوردية وحفظ السجل</button>  
  
        <div class="history-section">  
            <div class="history-header">  
                <span style="font-size:0.8rem; font-weight:bold;">العمليات الأخيرة</span>  
                <button onclick="confirmClear()" style="background:none; border:none; color:var(--red); font-family:inherit; font-size:0.75rem;">مسح القائمة</button>  
            </div>  
            <div class="history-list" id="history-list"></div>  
        </div>  
    </div>  
  
    <!-- Patients Page -->  
    <div id="page-patients" class="page">  
        <div style="padding:0 16px 12px; display:flex; gap:10px;">  
            <button onclick="openPatientModal()" class="btn-teal" style="padding:15px">+ إضافة مريض جديد</button>  
            <button onclick="exportPatientsReport()" class="btn-cancel" style="max-width:60px">📋</button>  
        </div>  
        <div class="history-list" id="patients-list"></div>  
    </div>  
  
    <!-- Archive Page -->  
    <div id="page-archive" class="page">  
        <div class="history-list" id="archive-list"></div>  
    </div>  
</div>  
  
<!-- Modals (Simple Logic) -->  
<div id="patient-modal" class="modal-overlay">  
    <div class="modal-box">  
        <h3 id="patient-modal-title" style="margin-bottom:15px">إضافة مريض</h3>  
        <input class="modal-input" id="p-name" type="text" placeholder="اسم المريض الثلاثي">  
        <input class="modal-input" id="p-id" type="text" placeholder="رقم الهوية / الإقامة" inputmode="numeric">  
        <select class="modal-select" id="p-insurance">  
            <option value="">-- شركة التأمين --</option>  
            <option>Bupa - بوبا</option>  
            <option>Tawuniya - التعاونية</option>  
            <option>MedGulf - ميدغلف</option>  
            <option>Rajhi - الراجحي</option>  
            <option>Malath - ملاذ</option>  
            <option>AXA - جلف كورب</option>  
            <option>GlobeMed - جلوب مد</option>  
            <option>MOH - وزارة الصحة</option>  
            <option>Self Pay - نقدي</option>  
        </select>  
        <select class="modal-select" id="p-status" onchange="toggleManagerZone(this.value)">  
            <option value="pending">🔄 تحت الإجراء</option>  
            <option value="accepted">✅ قبول التغطية</option>  
            <option value="rejected">❌ مرفوض</option>  
        </select>  
        <div id="manager-zone" style="display:none">  
            <select class="modal-select" id="p-manager">  
                <option value="">-- المدير المناوب --</option>  
                <option>عبدالعزيز الحربي</option>  
                <option>عبدالعزيز القرني</option>  
                <option>محمد القسومي</option>  
                <option>ياسر العتيبي</option>  
                <option>يوسف العميد</option>  
                <option>فهد الذياب</option>  
            </select>  
        </div>  
        <div style="display:flex; gap:10px; margin-top:10px">  
            <button class="btn-cancel" onclick="closeModal('patient-modal')">إلغاء</button>  
            <button class="btn-teal" onclick="savePatient()">حفظ البيانات</button>  
        </div>  
    </div>  
</div>  
  
<!-- Toast Notification -->  
<div id="toast" style="position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:var(--teal); color:var(--bg); padding:12px 24px; border-radius:50px; font-weight:bold; display:none; z-index:9999; box-shadow: 0 5px 15px rgba(0,0,0,0.3);"></div>  
  
<script>  
    // Database Logic  
    let mode = 'invoice';  
    let data = JSON.parse(localStorage.getItem('hammadi_v2_db') || '[]');  
    let archive = JSON.parse(localStorage.getItem('hammadi_archive') || '[]');  
    let patients = JSON.parse(localStorage.getItem('hammadi_patients') || '[]');  
    let editingPatientId = null;  
  
    // Clock  
    function updateClock() {  
        const now = new Date();  
        document.getElementById('time-chip').textContent = now.toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});  
        document.getElementById('date-chip').textContent = now.toLocaleDateString('en-GB');  
    }  
    setInterval(updateClock, 1000);  
    updateClock();  
  
    // Navigation  
    function showTab(tab) {  
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));  
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));  
        document.getElementById('page-' + tab).classList.add('active');  
        event.currentTarget.classList.add('active');  
        if(tab === 'archive') renderArchive();  
        if(tab === 'patients') renderPatients();  
    }  
  
    function setMode(m) {  
        mode = m;  
        document.getElementById('card-inv').className = m === 'invoice' ? 'stat-box active-inv' : 'stat-box';  
        document.getElementById('card-cash').className = m === 'cash' ? 'stat-box active-cash' : 'stat-box';  
    }  
  
    // Main Functions  
    function addEntry() {  
        const inp = document.getElementById('amt-input');  
        const val = parseFloat(inp.value);  
        if(!val || val <= 0) return;  
  
        data.push({  
            id: Date.now(),  
            amount: val,  
            type: mode,  
            time: new Date().toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'})  
        });  
          
        localStorage.setItem('hammadi_v2_db', JSON.stringify(data));  
        inp.value = '';  
        renderMain();  
        showToast("تمت الإضافة ✓");  
    }  
  
    function renderMain() {  
        const list = document.getElementById('history-list');  
        list.innerHTML = '';  
        let total = 0, inv = 0, cash = 0, cInv = 0, cCash = 0;  
  
        data.slice().reverse().forEach(item => {  
            total += item.amount;  
            if(item.type === 'invoice') { inv += item.amount; cInv++; }   
            else { cash += item.amount; cCash++; }  
  
            list.innerHTML += `  
                <div class="tx-item">  
                    <div style="display:flex; align-items:center; gap:12px">  
                        <span style="font-size:1.2rem">${item.type==='invoice'?'🧾':'💵'}</span>  
                        <div>  
                            <div style="font-weight:bold; font-size:0.9rem">${item.type==='invoice'?'شبكة':'كاش'}</div>  
                            <div style="font-size:0.65rem; color:var(--text-dim)">${item.time}</div>  
                        </div>  
                    </div>  
                    <div style="font-weight:900; color:var(--teal)">${item.amount.toFixed(2)}</div>  
                </div>  
            `;  
        });  
  
        document.getElementById('main-balance').textContent = total.toFixed(2);  
        document.getElementById('inv-sum-bal').textContent = inv.toFixed(2);  
        document.getElementById('cash-sum-bal').textContent = cash.toFixed(2);  
        document.getElementById('count-inv').textContent = cInv;  
        document.getElementById('count-cash').textContent = cCash;  
    }  
  
    // Patient Functions  
    function openPatientModal(id = null) {  
        editingPatientId = id;  
        if(id) {  
            const p = patients.find(x => x.id === id);  
            document.getElementById('p-name').value = p.name;  
            document.getElementById('p-id').value = p.patientId;  
            document.getElementById('p-insurance').value = p.insurance;  
            document.getElementById('p-status').value = p.status;  
            toggleManagerZone(p.status);  
            document.getElementById('p-manager').value = p.manager || '';  
        } else {  
            document.getElementById('p-name').value = '';  
            document.getElementById('p-id').value = '';  
            document.getElementById('p-status').value = 'pending';  
            toggleManagerZone('pending');  
        }  
        document.getElementById('patient-modal').classList.add('open');  
    }  
  
    function toggleManagerZone(val) {  
        document.getElementById('manager-zone').style.display = val === 'accepted' ? 'block' : 'none';  
    }  
  
    function savePatient() {  
        const name = document.getElementById('p-name').value;  
        const pId = document.getElementById('p-id').value;  
        const ins = document.getElementById('p-insurance').value;  
        const stat = document.getElementById('p-status').value;  
        const mgr = document.getElementById('p-manager').value;  
  
        if(!name || !pId || !ins) return showToast("أكمل البيانات أولاً!");  
  
        if(editingPatientId) {  
            const index = patients.findIndex(x => x.id === editingPatientId);  
            patients[index] = {...patients[index], name, patientId: pId, insurance: ins, status: stat, manager: mgr};  
        } else {  
            patients.unshift({ id: Date.now(), name, patientId: pId, insurance: ins, status: stat, manager: mgr, time: new Date().toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'}) });  
        }  
  
        localStorage.setItem('hammadi_patients', JSON.stringify(patients));  
        closeModal('patient-modal');  
        renderPatients();  
        showToast("تم الحفظ ✓");  
    }  
  
    function renderPatients() {  
        const list = document.getElementById('patients-list');  
        list.innerHTML = patients.length ? '' : '<div style="text-align:center; padding:40px; color:var(--text-dim)">لا يوجد مرضى مسجلين حالياً</div>';  
          
        patients.forEach(p => {  
            const sClass = p.status === 'accepted' ? 'status-accepted' : (p.status === 'rejected' ? 'status-rejected' : 'status-pending');  
            const sText = p.status === 'accepted' ? 'مقبول' : (p.status === 'rejected' ? 'مرفوض' : 'قيد الإجراء');  
              
            list.innerHTML += `  
                <div class="tx-item" onclick="openPatientModal(${p.id})">  
                    <div style="flex:1">  
                        <div style="font-weight:800; font-size:0.95rem">${p.name}</div>  
                        <div style="font-size:0.7rem; color:var(--text-dim)">هوية: ${p.patientId} | ${p.insurance}</div>  
                        <div style="margin-top:8px">  
                            <span class="status-badge ${sClass}">${sText}</span>  
                            <span style="font-size:0.65rem; margin-right:8px; color:var(--text-dim)">${p.manager || ''}</span>  
                        </div>  
                    </div>  
                    <div style="font-size:0.6rem; color:var(--text-dim)">${p.time}</div>  
                </div>  
            `;  
        });  
    }  
  
    // Utilities  
    function showToast(msg) {  
        const t = document.getElementById('toast');  
        t.textContent = msg;  
        t.style.display = 'block';  
        setTimeout(() => t.style.display = 'none', 2000);  
    }  
  
    function closeModal(id) { document.getElementById(id).classList.remove('open'); }  
  
    function confirmCloseDay() {  
        if(!data.length) return showToast("لا يوجد بيانات!");  
        if(!confirm("هل أنت متأكد من إغلاق الوردية؟ سيتم تصفير العدادات وحفظها بالسجل.")) return;  
          
        archive.unshift({ date: new Date().toLocaleDateString('en-GB'), total: data.reduce((s, x) => s + x.amount, 0), entries: data });  
        localStorage.setItem('hammadi_archive', JSON.stringify(archive));  
        data = [];  
        localStorage.setItem('hammadi_v2_db', JSON.stringify(data));  
        renderMain();  
        showToast("تم إغلاق الوردية بنجاح 📦");  
    }  
  
    function renderArchive() {  
        const list = document.getElementById('archive-list');  
        list.innerHTML = archive.length ? '' : '<div style="text-align:center; padding:40px; color:var(--text-dim)">السجل فارغ</div>';  
        archive.forEach(item => {  
            list.innerHTML += `  
                <div class="tx-item">  
                    <div>  
                        <div style="font-weight:bold">${item.date}</div>  
                        <div style="font-size:0.7rem; color:var(--text-dim)">${item.entries.length} عملية</div>  
                    </div>  
                    <div style="font-weight:900; color:var(--teal)">${item.total.toFixed(2)}</div>  
                </div>  
            `;  
        });  
    }  
  
    // Init  
    renderMain();  
</script>  
  
</body>  
</html>
